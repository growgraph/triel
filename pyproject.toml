[tool.poetry]
name = "lm_service"
version = "0.1.0"
description = "Convert text to graphs. Create candidates. Use language models fo entity linking"
authors = ["Alexander Belikov <alexander@growgraph.dev>"]

[tool.poetry.dependencies]
python = ">=3.9,<3.11"
Flask = "^2.0.3"
Flask-RESTful = "^0.3.9"
spacy = "^3.3.0"
coreferee = "^1.2.0"
networkx = "^2.6.3"
pandas = "^1.1.3"
pygraphviz = "^1.6"
torch = "^1.10.2"
torchtext = "^0.12.0"
pyyaml = "^6"
Unidecode = "^1.3.4"
Flask-SocketIO = "^5.2.0"
simple-websocket = "^0.5.2"
black = "^22.3.0"
graph-cast = {git = "ssh://git@github.com/alexander-belikov/graph_cast.git", rev = "main"}
mypy = "^0.971"
pre-commit = "^2.20.0"
pylint = "^2.14.5"
autoflake = "^1.4"
isort = "^5.10.1"
pyinflect = "^0.5.1"
lemminflect = "^0.2.2"
dataclass-wizard = "^0.22.1"
spacy-entity-linker = "^1.0.2"
types-requests = "^2.28.11.2"

[tool.poetry.group.dev.dependencies]
jupyter = "^1.0.0"

[tool.poetry.dev-dependencies]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.isort]
profile = "black"


