[build-system]
build-backend = "poetry.core.masonry.api"
packages = [
  {include = "lm_service"},
  {include = "test"}
]
requires = ["poetry-core>=1.0.0"]

[tool]

[tool.isort]
profile = "black"

[tool.poetry]
authors = ["Alexander Belikov <alexander@growgraph.dev>"]
description = "Convert text to graphs. Create candidates. Entity linking"
name = "lm_service"
version = "0.4.2"

[tool.poetry.dependencies]
Flask = "^2.0.3"
Flask-RESTful = "^0.3.9"
Flask-SocketIO = "^5.2.0"
Unidecode = "^1.3.4"
aenum = "^3.1.11"
autoflake = "^1.4"
black = "^22.3.0"
coreferee = "^1.4.0"
dataclass-wizard = "^0.22.1"
graph-cast = {git = "ssh://git@github.com/alexander-belikov/graph_cast.git", rev = "main"}
isort = "^5.10.1"
language-formatters-pre-commit-hooks = "^2.4.0"
lemminflect = "^0.2.2"
mypy = "^0.971"
networkx = "^2.6.3"
pandas = "^1.1.3"
pathos = "^0.3.0"
pre-commit = "^2.20.0"
pre-commit-hooks = "^4.3.0"
pygraphviz = "^1.6"
pyinflect = "^0.5.1"
pylint = "^2.14.5"
python = ">=3.9,<3.11"
pyyaml = "^6"
simple-websocket = "^0.5.2"
spacy = {extras = ["cuda12x"], version = "3.5"}
suthing = {git = "ssh://git@github.com/growgraph/suthing.git"}
torch = "^1.13.0"
torchtext = "^0.12.0"
types-requests = "^2.28.11.2"
types-waitress = "^2.1.4.3"
viztracer = "^0.15.6"
waitress = "^2.1.2"
wordfreq = "^3.0.3"
