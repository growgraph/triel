[tool.poetry]
name = "lm_service"
version = "0.1.0"
description = "Convert text to graphs. Create candidates. Use language models fo entity linking"
authors = ["Alexander Belikov <alexander@growgraph.dev>"]

[tool.poetry.dependencies]
python = ">=3.8,<3.11"
Flask = "^2.0.3"
Flask-RESTful = "^0.3.9"
spacy = "^3.3.0"
coreferee = "^1.2.0"
networkx = "^2.6.3"
pandas = "^1"
pygraphviz = "^1.9"
torch = "^1.10.2"
torchtext = "^0.12.0"
PyYAML = "^6.0"
Unidecode = "^1.3.4"
Flask-SocketIO = "^5.2.0"
simple-websocket = "^0.5.2"
black = "^22.3.0"

[tool.poetry.group.dev.dependencies]
jupyter = "^1.0.0"

[tool.poetry.dev-dependencies]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"


